[build-system]
requires = ["uv_build>=0.10.3,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "fedotmas"

[project]
name = "fedot-mas"
version = "0.1.0"
description = "Multi-Agent Systems Generation"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "google-adk[extensions]>=1.25.0",
    "loguru>=0.7.3",
    "platformdirs>=4.9.2",
    "pydantic>=2.12.5",
    "python-dotenv>=1.2.1",
    "rich>=14.3.2",
]
