[build-system]
build-backend = "uv_build"
requires = [ "uv-build>=0.10.3,<0.11" ]

[project]
name = "fedot-mas"
version = "0.1.0"
description = "Multi-Agent Systems Generation"
readme = "README.md"
requires-python = ">=3.12"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dependencies = [
  "google-adk>=1.25",
  "litellm>=1.80.16",
  "loguru>=0.7.3",
  "platformdirs>=4.9.2",
  "pydantic>=2.12.5",
  "python-dotenv>=1.2.1",
  "rich>=14.3.2",
]

[tool.uv]
build-backend.module-name = "fedotmas"
