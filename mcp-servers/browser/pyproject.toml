[tool.fedotmas]
mcp.name = "browser"
mcp.description = """\
  Headless browser for web automation, scraping, and data extraction. Navigate pages, extract markdown/structured \
  data, interact with elements, and run JavaScript.\
  """
mcp.tags = [ "browser", "web", "scraping", "automation" ]
mcp.command = "lightpanda"
mcp.args = [ "mcp" ]
mcp.timeout = 120
