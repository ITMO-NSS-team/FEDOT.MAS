repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/allganize/ty-pre-commit
    # Ty version.
    rev: v0.0.17
    hooks:
      # Run the type checker.
      - id: ty-check
