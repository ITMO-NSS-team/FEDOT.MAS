[build-system]
requires = ["uv_build>=0.10.3,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "fedotmas"

[project]
name = "fedot-mas"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=2.14.5",
    "google-adk>=1.25.0",
    "loguru>=0.7.3",
    "pydantic>=2.12.5",
    "python-dotenv>=1.2.1",
]

[dependency-groups]
dev = [
    "prek>=0.3.3",
    "ruff>=0.15.1",
    "ty>=0.0.17",
]

[tool.ty.rules]
unresolved-import = "ignore"
